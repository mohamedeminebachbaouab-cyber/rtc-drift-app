<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RTC Clock Verification Report</title>

<style>
@page {
  size: A4;
  margin: 20mm;
}

html, body {
  margin: 0;
  padding: 0;
  background: #eaeaea;
  font-family: Arial, Helvetica, sans-serif;
}

.a4-sheet {
  width: 210mm;
  height: 297mm;
  background: #ffffff;
  margin: 0 auto;
  box-sizing: border-box;
  padding: 20mm;
  position: relative;
}

.logo {
  height: 15mm;
  width: auto;
  display: block;
  margin-bottom: 15mm;
}

h1 {
  font-size: 22pt;
  margin: 0 0 15mm 0;
  font-weight: 700;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table td {
  padding: 6mm 4mm;
  border-bottom: 1px solid #ddd;
  font-size: 12pt;
}

.label {
  font-weight: bold;
  width: 45%;
}

.result {
  font-weight: bold;
  color: #1b5e20;
}

.footer {
  position: absolute;
  bottom: 20mm;
  left: 20mm;
  right: 20mm;
  font-size: 9pt;
  color: #777;
  text-align: right;
}

@media print {
  body {
    background: none;
  }
  .a4-sheet {
    margin: 0;
  }
}
</style>
</head>

<body>

<div class="a4-sheet">

  <img class="logo"
       src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Logo_of_the_Carrier_Corporation.svg/langfr-3840px-Logo_of_the_Carrier_Corporation.svg.png"
       alt="Carrier Logo">

  <h1>RTC Clock Verification</h1>

  <table class="table">
    <tr>
      <td class="label">Device</td>
      <td>%%IMEI%%</td>
    </tr>
    <tr>
      <td class="label">TRU Serial</td>
      <td>%%TRU_SERIAL%%</td>
    </tr>
    <tr>
      <td class="label">Test executed on</td>
      <td>%%TEST_DATE%%</td>
    </tr>
    <tr>
      <td class="label">Maximum drift</td>
      <td>%%DRIFT_MS%% ms</td>
    </tr>
    <tr>
      <td class="label">Drift test duration</td>
      <td>60 s</td>
    </tr>
    <tr>
      <td class="label">Drift</td>
      <td>%%DRIFT_PCT%% %</td>
    </tr>
    <tr>
      <td class="label">Result</td>
      <td class="result">%%RESULT_TEXT%%</td>
    </tr>
  </table>

  <div class="footer">
    Official Verification Report
  </div>

</div>

</body>
</html>
